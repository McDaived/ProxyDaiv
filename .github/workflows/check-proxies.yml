name: Check Proxies

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:


concurrency:
  group: check-proxies
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install checker dependencies
        working-directory: checker
        run: npm install --prefer-offline || npm install

      - name: Run proxy checker
        working-directory: checker
        run: |
          TDLIB_DIR=$(node -e "const {getTdjson}=require('prebuilt-tdlib');process.stdout.write(require('path').dirname(getTdjson()))")
          echo "TDLib dir: $TDLIB_DIR"
          ls "$TDLIB_DIR"
          LD_LIBRARY_PATH="$TDLIB_DIR:$LD_LIBRARY_PATH" node check.js
        timeout-minutes: 10

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/proxies.json
          git diff --staged --quiet || git commit -m "chore: update working proxies [skip ci]"
          git push
